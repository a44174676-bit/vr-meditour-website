services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./settlement.db
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - backend_data:/app
  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
volumes:
  backend_data:
