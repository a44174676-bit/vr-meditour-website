<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>AI 피부 분석 & 케어 컨시어지</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="vrmt-page">
    <section class="vrmt-landing" id="vrmtLanding">
      <div class="vrmt-container">
        <h1 class="vrmt-title">AI 피부 분석 & 케어 컨시어지</h1>
        <p class="vrmt-sub">카메라로 촬영한 얼굴 이미지를 AI가 분석해 피부 케어 방향을 제안합니다.</p>

        <div class="vrmt-grid">
          <div class="vrmt-col vrmt-col-text">
            <ul class="vrmt-list">
              <li>웹캠으로 얼굴 촬영</li>
              <li>촬영 이미지는 분석 요청에만 사용 (서버 저장 없음)</li>
              <li>AI 분석 결과를 JSON 구조로 표시</li>
              <li>의료 진단이 아닌 뷰티 참고 분석 제공</li>
            </ul>

            <div class="vrmt-actions">
              <button type="button" id="vrmtStartCameraBtn" class="vrmt-btn vrmt-btn-primary">카메라 시작하기</button>
              <button type="button" id="vrmtCaptureBtn" class="vrmt-btn vrmt-btn-outline">AI 판별 촬영</button>
            </div>

            <p class="vrmt-status" id="vrmtStatus">카메라를 시작한 뒤 얼굴을 가이드에 맞추고 AI 판별 촬영을 눌러 주세요.</p>
          </div>

          <div class="vrmt-col vrmt-col-camera">
            <div class="vrmt-card vrmt-camera-card">
              <div class="vrmt-camera-frame">
                <video id="vrmtCameraVideo" autoplay playsinline></video>
                <div id="vrmtFaceGuide" class="vrmt-face-guide">
                  <div class="vrmt-guide-circle"></div>
                  <div class="vrmt-guide-cross-h"></div>
                  <div class="vrmt-guide-cross-v"></div>
                </div>
                <canvas id="vrmtSnapshotCanvas" class="vrmt-snapshot" aria-hidden="true"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="vrmt-result-grid">
          <div class="vrmt-card" id="vrmtAnalysis">
            <h2 class="vrmt-card-title">AI 피부 분석 결과</h2>
            <p class="vrmt-muted">촬영 후 분석 버튼을 누르면 실제 AI 분석 JSON 결과가 표시됩니다.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
