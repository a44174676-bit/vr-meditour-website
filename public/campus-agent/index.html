<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUFS Campus AI·AR Guide</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Busan University of Foreign Studies</p>
      <h1>공식 캠퍼스맵 기반 AI·AR 안내</h1>
      <p class="hero-desc">
        공식 캠퍼스맵을 대체하지 않고, 방문자의 이해를 돕는 안내형 MVP입니다.
        정확한 위치·시설 정보는 공식 자료 확인이 필요합니다.
      </p>
      <div class="hero-actions">
        <button type="button" id="scrollToBuildings" class="btn btn-primary">건물 찾기</button>
        <a class="btn btn-outline" href="https://www.bufs.ac.kr" target="_blank" rel="noopener noreferrer">공식 캠퍼스맵 보기</a>
        <a class="btn btn-outline" href="https://www.bufs.ac.kr" target="_blank" rel="noopener noreferrer">캠퍼스 VR투어 보기</a>
      </div>
    </header>

    <main>
      <section class="search-panel" aria-label="캠퍼스 안내 검색">
        <label for="searchInput">질문 입력</label>
        <div class="search-row">
          <input id="searchInput" type="text" placeholder="예: 평생교육원 어디야? A302호 어디야?" />
          <button type="button" id="searchButton" class="btn btn-primary">검색</button>
        </div>
        <div id="searchResult" class="search-result" aria-live="polite"></div>
      </section>

      <section class="map-section" aria-label="캠퍼스 지도 및 마커">
        <div class="map-placeholder" id="mapArea">
          <p>공식 캠퍼스맵 이미지 연동 전입니다.<br />현재는 안내용 대체 지도 박스입니다.</p>
          <div class="markers" id="markerContainer"></div>
        </div>
      </section>

      <section id="buildings" class="buildings-section" aria-label="건물 목록">
        <h2>A~J 건물 안내</h2>
        <div id="buildingCards" class="building-cards"></div>
      </section>

      <section class="ar-section" aria-label="AR 미리보기">
        <h2>AR 안내 미리보기</h2>
        <div class="ar-preview" id="arPreview">
          <div class="ar-overlay">
            <p class="ar-selected" id="arBuildingName">선택된 건물 없음</p>
            <p class="ar-guidance" id="arGuidance">건물을 선택하면 방향 안내가 표시됩니다.</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      본 MVP는 공식 캠퍼스맵 확인을 보조하는 안내 화면입니다.
    </footer>

    <script src="script.js"></script>
  </body>
</html>
